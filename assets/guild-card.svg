<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Cheng's anime data hunter guild card</title>
  <desc id="desc">An anime fantasy guild-card banner for Cheng, focused on data engineering and machine learning.</desc>
  <defs>
    <linearGradient id="night" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#15131f"/>
      <stop offset="48%" stop-color="#24203a"/>
      <stop offset="100%" stop-color="#33243c"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" x2="1">
      <stop offset="0%" stop-color="#fff1c7"/>
      <stop offset="55%" stop-color="#f6c177"/>
      <stop offset="100%" stop-color="#eb6f92"/>
    </linearGradient>
    <linearGradient id="name" x1="0" x2="1">
      <stop offset="0%" stop-color="#f6c177"/>
      <stop offset="50%" stop-color="#ebbcba"/>
      <stop offset="100%" stop-color="#9ccfd8"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .name { font: 900 62px 'Trebuchet MS', 'Arial Black', sans-serif; fill: url(#name); letter-spacing: 1px; }
      .subtitle { font: 800 22px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #9ccfd8; }
      .tiny { font: 700 15px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #e0def4; opacity: .86; }
      .label { font: 900 13px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #f6c177; }
      .line { stroke: #f6c177; stroke-width: 2; opacity: .7; }
      .spark { fill: #f6c177; }
      @keyframes floaty {
        0%,100% { transform: translateY(0); opacity: .45; }
        50% { transform: translateY(-12px); opacity: 1; }
      }
      @keyframes slash {
        0% { transform: translateX(-42px); opacity: .12; }
        50% { opacity: .8; }
        100% { transform: translateX(42px); opacity: .12; }
      }
      @keyframes pulse {
        0%,100% { opacity: .45; }
        50% { opacity: 1; }
      }
      .floaty { animation: floaty 4.8s ease-in-out infinite; transform-origin: center; }
      .slash { animation: slash 3.2s ease-in-out infinite alternate; transform-origin: center; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#night)"/>

  <circle cx="986" cy="100" r="72" fill="url(#moon)" opacity=".92" filter="url(#softGlow)"/>
  <circle cx="1012" cy="82" r="72" fill="#24203a" opacity=".68"/>

  <path d="M0 312 C150 240 280 330 430 278 C590 220 708 328 858 274 C1000 223 1114 255 1200 210 L1200 420 L0 420 Z" fill="#31748f" opacity=".35"/>
  <path d="M0 355 C165 310 312 372 470 334 C630 296 776 362 936 314 C1044 282 1132 300 1200 270 L1200 420 L0 420 Z" fill="#eb6f92" opacity=".17"/>
  <path d="M0 382 C200 352 330 398 512 362 C705 325 852 391 1022 351 C1118 328 1170 338 1200 316 L1200 420 L0 420 Z" fill="#07070d" opacity=".5"/>

  <g class="slash" opacity=".72">
    <path d="M705 85 L1040 42" stroke="#9ccfd8" stroke-width="3"/>
    <path d="M690 113 L1048 66" stroke="#f6c177" stroke-width="2"/>
    <path d="M738 137 L1004 101" stroke="#ebbcba" stroke-width="2"/>
  </g>

  <g class="floaty">
    <circle class="spark" cx="112" cy="68" r="3"/>
    <circle class="spark" cx="258" cy="130" r="2"/>
    <circle class="spark" cx="705" cy="78" r="3"/>
    <circle class="spark" cx="1095" cy="155" r="2"/>
    <path class="spark" d="M620 62 l5 12 12 5 -12 5 -5 12 -5 -12 -12 -5 12 -5z" opacity=".8"/>
  </g>

  <g transform="translate(60 54)">
    <path class="line" d="M0 0 H230"/>
    <text class="label" x="0" y="34">GUILD CARD // DATA HUNTER ARC</text>
    <text class="name" x="0" y="112">Cheng Zhang</text>
    <text class="subtitle" x="4" y="154">FinTech Data Engineer · ML Builder</text>
    <text class="tiny" x="4" y="203">Python · SQL · Prefect · ADF · GCP · dbt · NLP</text>
    <text class="tiny" x="4" y="238">Building useful pipelines, honest models, and cleaner stories from data.</text>
    <path class="line" d="M0 294 H430"/>
  </g>

  <g transform="translate(836 202)" filter="url(#softGlow)">
    <path d="M126 0 L158 70 L232 78 L176 126 L194 199 L126 160 L58 199 L76 126 L20 78 L94 70 Z" fill="#191724" stroke="#f6c177" stroke-width="8"/>
    <path d="M126 44 L143 82 L184 87 L153 113 L163 154 L126 132 L89 154 L99 113 L68 87 L109 82 Z" fill="#eb6f92"/>
    <path class="pulse" d="M126 70 L136 94 L161 96 L142 112 L148 138 L126 124 L104 138 L110 112 L91 96 L116 94 Z" fill="#f6c177"/>
  </g>

  <g transform="translate(760 330)">
    <rect x="0" y="0" width="362" height="48" rx="14" fill="#191724" opacity=".82"/>
    <text class="label" x="18" y="20">CURRENT QUEST</text>
    <rect x="18" y="28" width="230" height="10" rx="5" fill="#403d52"/>
    <rect x="18" y="28" width="138" height="10" rx="5" fill="#9ccfd8"/>
    <text class="tiny" x="264" y="36">Portfolio rebuild</text>
  </g>
</svg>
