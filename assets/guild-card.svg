<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Cheng field punk data poster</title>
  <desc id="desc">A custom dark anime punk poster banner using black, teal, orange, and rough printed texture.</desc>
  <defs>
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.86" numOctaves="2" seed="19"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .16"/>
      </feComponentTransfer>
    </filter>
    <filter id="roughInk">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.6"/>
    </filter>
    <style>
      .titleText { font: 900 82px Impact, 'Arial Black', sans-serif; fill: #c85f05; letter-spacing: 2px; }
      .subText { font: 800 24px 'Trebuchet MS', Arial, sans-serif; fill: #f1e3c6; letter-spacing: 1px; }
      .mono { font: 800 17px 'Courier New', monospace; fill: #00a6a6; letter-spacing: 1px; }
      .tag { font: 900 18px 'Courier New', monospace; fill: #050606; }
      @keyframes scan {
        0% { transform: translateX(-70px); opacity: .16; }
        50% { opacity: .52; }
        100% { transform: translateX(70px); opacity: .16; }
      }
      @keyframes cable {
        0%, 100% { transform: rotate(-3deg); }
        50% { transform: rotate(4deg); }
      }
      .scan { animation: scan 5.5s ease-in-out infinite alternate; }
      .cable { animation: cable 4s ease-in-out infinite; transform-origin: 865px 80px; }
    </style>
  </defs>

  <rect width="1200" height="430" fill="#070808"/>
  <rect width="1200" height="430" filter="url(#paperNoise)" opacity=".95"/>
  <path d="M0 370 C190 332 350 396 520 350 C720 295 895 380 1200 310 L1200 430 L0 430 Z" fill="#081d1b"/>
  <path d="M0 392 C190 360 330 410 520 378 C700 348 890 405 1200 356 L1200 430 L0 430 Z" fill="#0d1212"/>

  <g class="scan">
    <path d="M70 86 H1110" stroke="#007f7a" stroke-width="2"/>
    <path d="M128 122 H980" stroke="#c85f05" stroke-width="2"/>
    <path d="M96 306 H1130" stroke="#007f7a" stroke-width="2"/>
  </g>

  <g transform="translate(62 72)" filter="url(#roughInk)">
    <text class="mono" x="0" y="0">FIELD DATA CLUB // LONDON</text>
    <text class="titleText" x="0" y="94">CHENG</text>
    <text class="titleText" x="0" y="176">ZHANG</text>
    <path d="M6 196 H560" stroke="#c85f05" stroke-width="14" stroke-linecap="round"/>
    <text class="subText" x="2" y="246">DATA ENGINEER / ML BUILDER</text>
    <text class="mono" x="4" y="286">PYTHON · SQL · PREFECT · ADF · GCP · DBT</text>
    <text class="mono" x="4" y="320">NLP · FRAUD SIGNALS · FORECASTING · DASHBOARDS</text>
    <g transform="translate(4 346)">
      <rect width="390" height="42" rx="0" fill="#c85f05"/>
      <text class="tag" x="18" y="27">NEW PROJECTS FROM SCRATCH</text>
    </g>
  </g>

  <g transform="translate(770 58)" filter="url(#roughInk)">
    <path class="cable" d="M96 0 C34 45 30 104 78 148 C132 198 113 268 54 332" stroke="#f1e3c6" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="98" cy="0" r="18" fill="#c85f05" stroke="#050606" stroke-width="6"/>
    <path d="M98 -11 C92 2 95 11 104 16" stroke="#050606" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(782 135)" opacity=".92" filter="url(#roughInk)">
    <circle cx="80" cy="44" r="38" fill="none" stroke="#f1e3c6" stroke-width="8"/>
    <circle cx="155" cy="44" r="38" fill="none" stroke="#f1e3c6" stroke-width="8"/>
    <path d="M115 44 H122" stroke="#f1e3c6" stroke-width="8" stroke-linecap="round"/>
    <circle cx="80" cy="44" r="13" fill="#00a6a6"/>
    <circle cx="155" cy="44" r="13" fill="#00a6a6"/>
    <path d="M22 175 C76 136 175 137 232 176" stroke="#007f7a" stroke-width="30" fill="none" stroke-linecap="round"/>
    <path d="M35 232 H250" stroke="#007f7a" stroke-width="44" stroke-linecap="round"/>
    <path d="M66 222 l54 18 l74 -12" stroke="#050606" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M66 262 l54 18 l74 -12" stroke="#050606" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M50 170 H236" stroke="#c85f05" stroke-width="14"/>
    <circle cx="292" cy="169" r="22" fill="none" stroke="#f1e3c6" stroke-width="3"/>
    <text x="285" y="177" font-family="'Courier New', monospace" font-size="24" font-weight="900" fill="#f1e3c6">!</text>
  </g>
</svg>
