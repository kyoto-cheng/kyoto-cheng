<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Cheng ML Hunter Guild Card</title>
  <desc id="desc">A Monster-Hunter-inspired fantasy guild card for Cheng, focused on machine learning and data engineering.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#191724"/>
      <stop offset="48%" stop-color="#1f1d2e"/>
      <stop offset="100%" stop-color="#26233a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0%" stop-color="#f6c177"/>
      <stop offset="50%" stop-color="#ebbcba"/>
      <stop offset="100%" stop-color="#f6c177"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .small { font: 700 20px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #e0def4; }
      .tiny { font: 600 15px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #908caa; }
      .title { font: 900 58px 'Trebuchet MS', 'Arial Black', sans-serif; fill: url(#gold); letter-spacing: 1px; }
      .subtitle { font: 700 22px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #9ccfd8; }
      .badge { fill: #eb6f92; }
      .line { stroke: #f6c177; stroke-width: 2; opacity: .68; }
      .spark { fill: #f6c177; opacity: .9; }
      @keyframes drift {
        0% { transform: translateX(-40px); opacity: .2; }
        50% { opacity: .95; }
        100% { transform: translateX(40px); opacity: .2; }
      }
      @keyframes pulse {
        0%,100% { opacity: .45; }
        50% { opacity: 1; }
      }
      .drift { animation: drift 6s ease-in-out infinite alternate; transform-origin: center; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#sky)"/>
  <path d="M0 315 C170 250 270 340 430 285 C580 235 710 330 855 275 C1000 220 1110 260 1200 215 L1200 420 L0 420 Z" fill="#31748f" opacity=".35"/>
  <path d="M0 350 C165 310 300 365 455 330 C610 295 760 365 930 315 C1050 280 1130 300 1200 270 L1200 420 L0 420 Z" fill="#eb6f92" opacity=".18"/>
  <path d="M0 376 C190 350 330 395 505 360 C680 325 830 390 1010 350 C1115 326 1165 335 1200 315 L1200 420 L0 420 Z" fill="#000" opacity=".25"/>

  <g class="drift">
    <circle class="spark" cx="120" cy="78" r="3"/>
    <circle class="spark" cx="250" cy="125" r="2"/>
    <circle class="spark" cx="720" cy="82" r="3"/>
    <circle class="spark" cx="1020" cy="122" r="2.5"/>
    <circle class="spark" cx="1085" cy="63" r="2"/>
  </g>

  <g transform="translate(62 58)">
    <path class="line" d="M0 0 H210"/>
    <path class="line" d="M0 300 H380"/>
    <text class="tiny" x="0" y="36">GUILD CARD // LONDON BASE CAMP</text>
    <text class="title" x="0" y="112">Cheng Zhang</text>
    <text class="subtitle" x="4" y="154">Data Scientist &amp; Data Engineer</text>
    <text class="small" x="4" y="205">HR 001  ·  Python / SQL / NLP / MLOps / AWS</text>
    <text class="tiny" x="4" y="242">Quest: build original machine learning systems from a clean slate</text>
  </g>

  <g transform="translate(855 70)" filter="url(#glow)">
    <path d="M125 0 L160 82 L250 90 L182 146 L202 235 L125 188 L48 235 L68 146 L0 90 L90 82 Z" fill="none" stroke="#f6c177" stroke-width="8"/>
    <path d="M125 45 L146 96 L201 101 L160 136 L172 190 L125 162 L78 190 L90 136 L49 101 L104 96 Z" fill="#eb6f92" opacity=".82"/>
    <path class="pulse" d="M125 74 L138 106 L173 109 L147 130 L155 164 L125 146 L95 164 L103 130 L77 109 L112 106 Z" fill="#f6c177"/>
  </g>

  <g transform="translate(770 318)">
    <rect x="0" y="0" width="338" height="44" rx="12" fill="#191724" opacity=".78"/>
    <rect x="14" y="14" width="218" height="16" rx="8" fill="#403d52"/>
    <rect x="14" y="14" width="152" height="16" rx="8" fill="#9ccfd8"/>
    <text class="tiny" x="248" y="28">PROFILE QUEST 60%</text>
  </g>
</svg>
